query {
    g1: guillotine(project: "myproject", branch: "master", siteKey: "siteid") {
        get(key: "contentid") {
            _id
            displayName
        }
    }
    g2: guillotine(project: "myproject", branch: "draft", siteKey: "/sitePath") {
        get(key: "${site}/contentPath") {
            _id
            displayName
        }
    }
}
